services:
  mysql:
    image: mysql:8.0
    container_name: joystick-junction-db
    environment:
      MYSQL_ROOT_PASSWORD: "password123"
      MYSQL_DATABASE: joystick_junction
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
    container_name: joystick-junction-api
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://root:password123@mysql:3306/joystick_junction
      PORT: 4000
      JWT_SECRET: a2eaebfcf167363f5d31091ed86ef1282bf2b53bb44f34a363376d0c185d1521
      CORS_ORIGIN: http://localhost:3000

volumes:
  mysql_data:
