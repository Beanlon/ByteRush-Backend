services:
  mysql:
    image: mysql:8.0
    container_name: joystick-junction-db
    environment:
      MYSQL_ROOT_PASSWORD: "password123"
      MYSQL_DATABASE: joystick_junction
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
